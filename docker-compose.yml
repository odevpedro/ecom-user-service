services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ecom
      POSTGRES_PASSWORD: ecom
      POSTGRES_DB: ecom_user
    ports:
      - "5437:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecom"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "3007:3007"
    environment:
      PORT: 3007
      DATABASE_URL: jdbc:postgresql://db:5432/ecom_user
      DATABASE_USER: ecom
      DATABASE_PASSWORD: ecom
      JWT_SECRET: change-me-in-production
      JWT_EXPIRATION: 86400000
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres-data:
