server:
  port: ${PORT:3007}

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/ecom_user}
    username: ${DATABASE_USER:ecom}
    password: ${DATABASE_PASSWORD:ecom}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET:change-me-in-production}
  expiration: ${JWT_EXPIRATION:86400000}

services:
  notification: ${NOTIFICATION_SERVICE_URL:http://localhost:3008}
